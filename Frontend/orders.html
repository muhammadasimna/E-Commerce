<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina - My Orders</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .orders-container {
            padding: 50px 0;
        }
        .order-card {
            padding: 25px;
            display: flex;
            align-items: center;
            gap: 20px;
            transition: 0.3s;
        }

        .view-controls {
            display: flex;
            gap: 10px;
        }

        .view-btn {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            color: var(--text);
            padding: 8px 16px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
            font-size: 0.9rem;
        }

        .view-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        .view-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            box-shadow: 0 4px 15px rgba(108, 99, 255, 0.3);
        }

        #orders-list {
            display: grid;
            gap: 20px;
        }

        #orders-list.grid {
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        }

        #orders-list.list {
            grid-template-columns: 1fr;
        }

        #orders-list.grid .order-card {
            flex-direction: column;
            text-align: center;
            padding: 30px;
        }

        #orders-list.grid .order-card .order-thumb {
            width: 100% !important;
            height: 180px !important;
            margin-bottom: 15px;
        }

        #orders-list.grid .order-card > div {
            text-align: center !important;
            width: 100%;
        }

        .status-badge {
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
        }
        .status-pending { background: rgba(245, 158, 11, 0.2); color: #f59e0b; }
        .status-submitted { background: rgba(16, 185, 129, 0.2); color: #10b981; }
        .status-rejected { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
    </style>
</head>
<body>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo">LUMINA</div>
            <i class="fa-solid fa-xmark" id="close-sidebar" style="cursor: pointer; font-size: 1.5rem;"></i>
        </div>
        <div id="sidebar-user-profile"></div>
        <div class="sidebar-links">
            <a href="/">Home</a>
            <a href="/add-product">Sell Product</a>
            <a href="/orders">My Orders</a>
            <a href="/cart">Cart</a>
        </div>
    </div>
    <div class="overlay" id="overlay"></div>

    <header>
        <div class="container">
            <nav>
                <div class="menu-btn" id="open-sidebar">
                    <i class="fa-solid fa-bars"></i>
                </div>
                
                <a href="/" class="logo">LUMINA</a>

                <ul class="nav-links">
                    <li><a href="/">Home</a></li>
                    <li><a href="/add-product">Sell</a></li>
                    <li><a href="/orders">My Orders</a></li>
                </ul>

                <div class="nav-actions">
                    <button id="theme-toggle" class="theme-toggle">
                        <i class="fa-solid fa-moon"></i>
                    </button>
                    <a href="/cart" class="cart-icon">
                        <i class="fa-solid fa-cart-shopping"></i>
                        <span class="cart-count" id="cart-count">0</span>
                    </a>
                    <div id="user-link">
                        <a href="/auth"><i class="fa-regular fa-user"></i></a>
                    </div>
                </div>
            </nav>
        </div>
    </header>

    <main class="container orders-container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; flex-wrap: wrap; gap: 15px;">
            <h1 style="margin: 0;">My Order History</h1>
            <div class="view-controls">
                <button class="view-btn active" id="grid-view-btn" title="Grid View">
                    <i class="fa-solid fa-grip"></i>
                    <span>Grid</span>
                </button>
                <button class="view-btn" id="list-view-btn" title="List View">
                    <i class="fa-solid fa-list"></i>
                    <span>List</span>
                </button>
            </div>
        </div>
        <div id="orders-list" class="grid">
            <div class="loading">Fetching your orders...</div>
        </div>
    </main>

    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = '/auth';
                return;
            }

            updateUI();

            // View Toggle Logic
            const gridBtn = document.getElementById('grid-view-btn');
            const listBtn = document.getElementById('list-view-btn');
            const ordersList = document.getElementById('orders-list');

            gridBtn.onclick = () => {
                gridBtn.classList.add('active');
                listBtn.classList.remove('active');
                ordersList.className = 'grid';
            };

            listBtn.onclick = () => {
                listBtn.classList.add('active');
                gridBtn.classList.remove('active');
                ordersList.className = 'list';
            };

            const list = document.getElementById('orders-list');
            
            try {
                const response = await fetch(`${API_URL}/orders/my-orders`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const orders = await response.json();

                if (orders.length === 0) {
                    list.innerHTML = `
                        <div style="text-align: center; padding: 50px;">
                            <i class="fa-solid fa-box-open" style="font-size: 3rem; color: var(--text-muted); margin-bottom: 20px;"></i>
                            <p>You haven't placed any orders yet.</p>
                        </div>
                    `;
                    return;
                }

                list.innerHTML = orders.map(order => `
                    <div class="order-card glass animate-fade-in">
                        <img src="${order.image_url}" class="order-thumb" style="width: 60px; height: 60px; border-radius: 8px; object-fit: cover;">
                        <div class="order-info" style="flex: 1;">
                            <div class="order-product-name" style="font-size: 1rem; font-weight: 600;">${order.product_name}</div>
                            <div class="order-meta" style="font-size: 0.8rem;">
                                Order #${order.id} | ${new Date(order.created_at).toLocaleDateString()}
                            </div>
                            <div class="order-price-qty" style="font-size: 0.85rem; color: var(--text-muted); margin-top: 4px;">
                                Price: $${order.item_price.toFixed(2)} | Qty: ${order.quantity}
                            </div>
                        </div>
                        <div class="order-status-group" style="text-align: right;">
                            <div class="order-total" style="font-weight: 700; color: var(--primary); font-size: 1.1rem;">
                                $${(order.item_price * order.quantity).toFixed(2)}
                            </div>
                            <span class="status-badge status-${order.status}" style="font-size: 0.7rem;">${order.status}</span>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                list.innerHTML = '<p>Error loading orders.</p>';
            }
        });
    </script>
</body>
</html>
