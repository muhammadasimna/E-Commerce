<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina - Premium E-Commerce</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo">LUMINA</div>
            <i class="fa-solid fa-xmark" id="close-sidebar" style="cursor: pointer; font-size: 1.5rem;"></i>
        </div>
        <div id="sidebar-user-profile"></div>
        <div class="sidebar-links">
            <a href="/">Home</a>
            <a href="/add-product">Sell Product</a>
            <a href="/orders">My Orders</a>
            <a href="/cart">Cart</a>
        </div>
    </div>
    <div class="overlay" id="overlay"></div>

    <header>
        <div class="container">
            <nav>
                <div class="menu-btn" id="open-sidebar">
                    <i class="fa-solid fa-bars"></i>
                </div>
                
                <a href="/" class="logo">LUMINA</a>

                <ul class="nav-links">
                    <li><a href="/">Home</a></li>
                    <li><a href="/add-product">Sell</a></li>
                </ul>

                <div class="nav-actions">
                    <button id="theme-toggle" class="theme-toggle">
                        <i class="fa-solid fa-moon"></i>
                    </button>
                    <a href="/cart" class="cart-icon">
                        <i class="fa-solid fa-cart-shopping"></i>
                        <span class="cart-count" id="cart-count">0</span>
                    </a>
                    <div id="user-link">
                        <a href="/auth"><i class="fa-regular fa-user"></i></a>
                    </div>
                </div>
            </nav>
        </div>
    </header>

    <main>
        <section class="hero animate-fade-in">
            <div class="container">
                <h1>Elevate Your Lifestyle</h1>
                <p>Discover our curated collection of premium products designed for modern living. Quality meets elegance in every piece.</p>
                <a href="#products" class="btn btn-primary" style="width: auto; padding: 15px 40px;">Shop Collection</a>
            </div>
        </section>

        <section id="products" class="container">
            <div class="product-grid" id="product-grid">
                <!-- Products will be loaded here via JS -->
                <div class="loading">Loading products...</div>
            </div>
        </section>
    </main>

    <footer style="padding: 50px 0; text-align: center; border-top: 1px solid var(--glass-border); margin-top: 100px;">
        <div class="container">
            <p>&copy; 2026 LUMINA Premium Store. All rights reserved.</p>
        </div>
    </footer>

    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            loadProducts();
            updateUI();
        });
    </script>
</body>
</html>
