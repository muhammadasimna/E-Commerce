<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina - My Products</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo">LUMINA</div>
            <i class="fa-solid fa-xmark" id="close-sidebar" style="cursor: pointer; font-size: 1.5rem;"></i>
        </div>
        <div id="sidebar-user-profile"></div>
        <div class="sidebar-links">
            <a href="/">Home</a>
            <a href="/add-product">Sell Product</a>
            <a href="/my-products">My Products</a>
            <a href="/orders">My Orders</a>
            <a href="/cart">Cart</a>
        </div>
    </div>
    <div class="overlay" id="overlay"></div>

    <header>
        <div class="container">
            <nav>
                <div class="menu-btn" id="open-sidebar">
                    <i class="fa-solid fa-bars"></i>
                </div>
                <a href="/" class="logo">LUMINA</a>
                <ul class="nav-links">
                    <li><a href="/">Home</a></li>
                    <li><a href="/add-product">Sell</a></li>
                    <li><a href="/my-products">My Listings</a></li>
                </ul>
                <div class="nav-actions">
                    <button id="theme-toggle" class="theme-toggle">
                        <i class="fa-solid fa-moon"></i>
                    </button>
                    <a href="/cart" class="cart-icon">
                        <i class="fa-solid fa-cart-shopping"></i>
                        <span class="cart-count" id="cart-count">0</span>
                    </a>
                    <div id="user-link">
                        <a href="/auth"><i class="fa-regular fa-user"></i></a>
                    </div>
                </div>
            </nav>
        </div>
    </header>

    <main class="container">
        <h1 style="margin: 40px 0;">My Product Listings</h1>
        <div class="product-grid" id="my-product-grid">
            <div class="loading">Fetching your listings...</div>
        </div>
    </main>

    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = '/auth';
                return;
            }
            updateUI();
            loadMyProducts();
        });

        async function loadMyProducts() {
            const grid = document.getElementById('my-product-grid');
            const token = localStorage.getItem('token');

            try {
                const response = await fetch(`${API_URL}/products/my-products`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const products = await response.json();

                if (products.length === 0) {
                    grid.innerHTML = '<p style="text-align: center; grid-column: 1/-1;">You haven\'t listed any products yet.</p>';
                    return;
                }

                grid.innerHTML = products.map(product => `
                    <div class="product-card glass animate-fade-in">
                        <img src="${product.image_url}" alt="${product.name}" class="product-image">
                        <div class="product-info">
                            <div class="product-category">${product.category}</div>
                            <h3 class="product-title">${product.name}</h3>
                            <div class="product-price">$${product.price.toFixed(2)}</div>
                            <div style="font-size: 0.8rem; color: #10b981; margin-bottom: 10px;">Status: Active Listing</div>
                            <div style="display: flex; gap: 10px;">
                                <button class="btn btn-secondary" style="flex: 1;" onclick="window.location.href='/product?id=${product.id}'">View Details</button>
                                <button class="btn btn-primary" style="flex: 1;" onclick="window.location.href='/edit-product?id=${product.id}'">
                                    <i class="fa-solid fa-pen-to-square"></i> Edit
                                </button>
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                grid.innerHTML = '<p>Error loading your products.</p>';
            }
        }
    </script>
</body>
</html>
