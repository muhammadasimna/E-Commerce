<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina - Sell Product</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo">LUMINA</div>
            <i class="fa-solid fa-xmark" id="close-sidebar" style="cursor: pointer; font-size: 1.5rem;"></i>
        </div>
        <div id="sidebar-user-profile"></div>
        <div class="sidebar-links">
            <a href="/">Home</a>
            <a href="/orders">My Orders</a>
            <a href="/cart">Cart</a>
        </div>
    </div>
    <div class="overlay" id="overlay"></div>

    <header>
        <div class="container">
            <nav>
                <div class="menu-btn" id="open-sidebar">
                    <i class="fa-solid fa-bars"></i>
                </div>
                <a href="/" class="logo">LUMINA</a>
                <ul class="nav-links">
                    <li><a href="/">Home</a></li>
                </ul>
                <div class="nav-actions">
                    <button id="theme-toggle" class="theme-toggle">
                        <i class="fa-solid fa-moon"></i>
                    </button>
                    <a href="/cart" class="cart-icon">
                        <i class="fa-solid fa-cart-shopping"></i>
                        <span class="cart-count" id="cart-count">0</span>
                    </a>
                    <div id="user-link">
                        <a href="/auth"><i class="fa-regular fa-user"></i></a>
                    </div>
                </div>
            </nav>
        </div>
    </header>

    <main class="container">
        <div class="auth-container glass animate-fade-in" style="max-width: 600px;">
            <h2 style="margin-bottom: 30px; text-align: center;">List a New Product</h2>
            <form id="add-product-form">
                <div class="form-group">
                    <label>Product Name*</label>
                    <input type="text" id="p-name" required placeholder="e.g. Vintage Camera">
                </div>
                <div class="form-group">
                    <label>Price ($)*</label>
                    <input type="number" step="0.01" id="p-price" required placeholder="99.99">
                </div>
                <div class="form-group">
                    <label>Image URL*</label>
                    <input type="url" id="p-image" required placeholder="https://example.com/image.jpg">
                    <div id="image-preview-container" style="margin-top: 15px; display: none;">
                        <label style="display: block; margin-bottom: 8px; font-size: 0.8rem;">Image Preview</label>
                        <img id="image-preview" src="" style="width: 100%; height: 200px; object-fit: cover; border-radius: 12px; border: 1px solid var(--glass-border); box-shadow: var(--card-shadow);">
                    </div>
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <input type="text" id="p-category" placeholder="e.g. Electronics">
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="p-desc" style="width: 100%; padding: 12px; border-radius: 8px; background: var(--surface-light); border: 1px solid var(--glass-border); color: var(--text); font-family: inherit; min-height: 100px;"></textarea>
                </div>
                <button type="submit" class="btn btn-primary">Create Listing</button>
                <div id="product-msg" style="margin-top: 15px; text-align: center;"></div>
            </form>
        </div>
    </main>

    <script src="/js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('token');
            if (!token) {
                showCustomModal({
                    title: 'Access Denied',
                    message: 'Please login to list products',
                    onConfirm: () => window.location.href = '/auth'
                });
                return;
            }
            updateUI();

            // Image Preview Logic
            const imgInput = document.getElementById('p-image');
            const imgPreview = document.getElementById('image-preview');
            const previewContainer = document.getElementById('image-preview-container');

            imgInput.addEventListener('input', () => {
                const url = imgInput.value;
                if (url) {
                    imgPreview.src = url;
                    previewContainer.style.display = 'block';
                    
                    // Handle load error
                    imgPreview.onerror = () => {
                        previewContainer.style.display = 'none';
                    };
                } else {
                    previewContainer.style.display = 'none';
                }
            });
        });

        document.getElementById('add-product-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const token = localStorage.getItem('token');
            const msgDiv = document.getElementById('product-msg');

            const productData = {
                name: document.getElementById('p-name').value,
                price: parseFloat(document.getElementById('p-price').value),
                image_url: document.getElementById('p-image').value,
                category: document.getElementById('p-category').value,
                description: document.getElementById('p-desc').value,
                stock: 10
            };

            try {
                const response = await fetch(`${API_URL}/products`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(productData)
                });

                const data = await response.json();
                if (response.ok) {
                    msgDiv.innerHTML = `<span style="color: #10b981;">${data.message}! Redirecting...</span>`;
                    setTimeout(() => window.location.href = '/', 2000);
                } else {
                    msgDiv.innerHTML = `<span style="color: var(--secondary);">${data.message}</span>`;
                }
            } catch (err) {
                msgDiv.innerHTML = `<span style="color: var(--secondary);">Failed to connect to server</span>`;
            }
        });
    </script>
</body>
</html>
