<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina - Edit Product</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo">LUMINA</div>
            <i class="fa-solid fa-xmark" id="close-sidebar" style="cursor: pointer; font-size: 1.5rem;"></i>
        </div>
        <div id="sidebar-user-profile"></div>
        <div class="sidebar-links">
            <a href="/">Home</a>
            <a href="/my-products">My Listings</a>
            <a href="/orders">My Orders</a>
            <a href="/cart">Cart</a>
        </div>
    </div>
    <div class="overlay" id="overlay"></div>

    <header>
        <div class="container">
            <nav>
                <div class="menu-btn" id="open-sidebar">
                    <i class="fa-solid fa-bars"></i>
                </div>
                <a href="/" class="logo">LUMINA</a>
                <ul class="nav-links">
                    <li><a href="/">Home</a></li>
                    <li><a href="/my-products">My Listings</a></li>
                </ul>
                <div class="nav-actions">
                    <button id="theme-toggle" class="theme-toggle">
                        <i class="fa-solid fa-moon"></i>
                    </button>
                    <a href="/cart" class="cart-icon">
                        <i class="fa-solid fa-cart-shopping"></i>
                        <span class="cart-count" id="cart-count">0</span>
                    </a>
                    <div id="user-link"></div>
                </div>
            </nav>
        </div>
    </header>

    <main class="container">
        <div class="auth-container glass animate-fade-in" style="max-width: 600px;">
            <h2 style="margin-bottom: 30px; text-align: center;">Edit Product Listing</h2>
            <form id="edit-product-form">
                <div class="form-group">
                    <label>Product Name*</label>
                    <input type="text" id="p-name" required placeholder="e.g. Vintage Camera">
                </div>
                <div class="form-group">
                    <label>Price ($)*</label>
                    <input type="number" step="0.01" id="p-price" required placeholder="99.99">
                </div>
                <div class="form-group">
                    <label>Image URL*</label>
                    <input type="url" id="p-image" required placeholder="https://example.com/image.jpg">
                    <div id="image-preview-container" style="margin-top: 15px; display: none;">
                        <label style="display: block; margin-bottom: 8px; font-size: 0.8rem;">Image Preview</label>
                        <img id="image-preview" src="" style="width: 100%; height: 200px; object-fit: cover; border-radius: 12px; border: 1px solid var(--glass-border); box-shadow: var(--card-shadow);">
                    </div>
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <input type="text" id="p-category" placeholder="e.g. Electronics">
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="p-desc" style="width: 100%; padding: 12px; border-radius: 8px; background: var(--surface-light); border: 1px solid var(--glass-border); color: var(--text); font-family: inherit; min-height: 100px;"></textarea>
                </div>
                <div style="display: flex; gap: 15px;">
                    <button type="submit" class="btn btn-primary" style="flex: 2;">Update Product</button>
                    <button type="button" class="btn btn-secondary" style="flex: 1;" onclick="window.location.href='/my-products'">Cancel</button>
                </div>
                <div id="product-msg" style="margin-top: 15px; text-align: center;"></div>
            </form>
        </div>
    </main>

    <script src="/js/app.js"></script>
    <script>
        let productId = null;

        document.addEventListener('DOMContentLoaded', async () => {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = '/auth';
                return;
            }
            
            const urlParams = new URLSearchParams(window.location.search);
            productId = urlParams.get('id');

            if (!productId) {
                window.location.href = '/my-products';
                return;
            }

            updateUI();

            // Image Preview Logic
            const imgInput = document.getElementById('p-image');
            const imgPreview = document.getElementById('image-preview');
            const previewContainer = document.getElementById('image-preview-container');

            const updatePreview = () => {
                const url = imgInput.value;
                if (url) {
                    imgPreview.src = url;
                    previewContainer.style.display = 'block';
                    imgPreview.onerror = () => {
                        previewContainer.style.display = 'none';
                    };
                } else {
                    previewContainer.style.display = 'none';
                }
            };

            imgInput.addEventListener('input', updatePreview);
            window.updatePreview = updatePreview; // Make it accessible

            await loadProductData();
        });

        async function loadProductData() {
            try {
                const response = await fetch(`${API_URL}/products/${productId}`);
                const product = await response.json();

                if (response.ok) {
                    document.getElementById('p-name').value = product.name;
                    document.getElementById('p-price').value = product.price;
                    document.getElementById('p-image').value = product.image_url;
                    document.getElementById('p-category').value = product.category;
                    document.getElementById('p-desc').value = product.description;
                    
                    if (window.updatePreview) window.updatePreview();
                    
                    // Optional: Check if user is owner
                    const user = JSON.parse(localStorage.getItem('user'));
                    if (user && product.owner_id !== user.id) {
                        showCustomModal({
                            title: 'Access Denied',
                            message: 'You are not authorized to edit this product.',
                            onConfirm: () => window.location.href = '/my-products'
                        });
                    }
                } else {
                    window.location.href = '/my-products';
                }
            } catch (err) {
                console.error('Failed to load product', err);
            }
        }

        document.getElementById('edit-product-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const token = localStorage.getItem('token');
            const msgDiv = document.getElementById('product-msg');

            const productData = {
                name: document.getElementById('p-name').value,
                price: parseFloat(document.getElementById('p-price').value),
                image_url: document.getElementById('p-image').value,
                category: document.getElementById('p-category').value,
                description: document.getElementById('p-desc').value,
                stock: 10
            };

            try {
                const response = await fetch(`${API_URL}/products/${productId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(productData)
                });

                const data = await response.json();
                if (response.ok) {
                    msgDiv.innerHTML = `<span style="color: #10b981;">${data.message}! Redirecting...</span>`;
                    setTimeout(() => window.location.href = '/my-products', 1500);
                } else {
                    msgDiv.innerHTML = `<span style="color: var(--secondary);">${data.message}</span>`;
                }
            } catch (err) {
                console.error('Update failed:', err);
                msgDiv.innerHTML = `<span style="color: var(--secondary);">Failed to connect to server. Check console for details.</span>`;
            }
        });
    </script>
</body>
</html>
